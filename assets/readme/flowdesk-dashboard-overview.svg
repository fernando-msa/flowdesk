<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#172A45"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="180" cy="160" r="140" fill="#22C55E" fill-opacity="0.25" filter="url(#blur)"/>
  <circle cx="1410" cy="140" r="170" fill="#06B6D4" fill-opacity="0.22" filter="url(#blur)"/>

  <rect x="80" y="72" width="1440" height="756" rx="24" fill="#0F1D33" stroke="#355173"/>
  <rect x="80" y="72" width="1440" height="58" rx="24" fill="#132741"/>
  <circle cx="118" cy="101" r="7" fill="#F87171"/>
  <circle cx="142" cy="101" r="7" fill="#FBBF24"/>
  <circle cx="166" cy="101" r="7" fill="#34D399"/>
  <text x="220" y="108" fill="#DBEAFE" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">FlowDesk - Dashboard Operacional</text>

  <rect x="110" y="160" width="250" height="640" rx="16" fill="#10233C"/>
  <text x="140" y="205" fill="#7DD3FC" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Navegacao</text>
  <text x="140" y="250" fill="#E2E8F0" font-size="16" font-family="Segoe UI, Arial, sans-serif">Dashboard</text>
  <text x="140" y="285" fill="#9FB6CF" font-size="16" font-family="Segoe UI, Arial, sans-serif">Tickets</text>
  <text x="140" y="320" fill="#9FB6CF" font-size="16" font-family="Segoe UI, Arial, sans-serif">Checklists</text>
  <text x="140" y="355" fill="#9FB6CF" font-size="16" font-family="Segoe UI, Arial, sans-serif">Nao conformidades</text>
  <text x="140" y="390" fill="#9FB6CF" font-size="16" font-family="Segoe UI, Arial, sans-serif">Configuracoes</text>

  <rect x="390" y="160" width="350" height="150" rx="18" fill="url(#card)" stroke="#3E5E84"/>
  <text x="420" y="205" fill="#D1FAE5" font-size="16" font-family="Segoe UI, Arial, sans-serif">Tickets abertos</text>
  <text x="420" y="265" fill="#F8FAFC" font-size="52" font-family="Segoe UI, Arial, sans-serif" font-weight="800">142</text>
  <text x="560" y="265" fill="#86EFAC" font-size="18" font-family="Segoe UI, Arial, sans-serif">+12% semana</text>

  <rect x="760" y="160" width="350" height="150" rx="18" fill="url(#card)" stroke="#3E5E84"/>
  <text x="790" y="205" fill="#BAE6FD" font-size="16" font-family="Segoe UI, Arial, sans-serif">SLA cumprido</text>
  <text x="790" y="265" fill="#F8FAFC" font-size="52" font-family="Segoe UI, Arial, sans-serif" font-weight="800">97.8%</text>

  <rect x="1130" y="160" width="350" height="150" rx="18" fill="url(#card)" stroke="#3E5E84"/>
  <text x="1160" y="205" fill="#BAE6FD" font-size="16" font-family="Segoe UI, Arial, sans-serif">Tempo medio de resposta</text>
  <text x="1160" y="265" fill="#F8FAFC" font-size="52" font-family="Segoe UI, Arial, sans-serif" font-weight="800">1h 24m</text>

  <rect x="390" y="340" width="760" height="280" rx="18" fill="#102742" stroke="#3E5E84"/>
  <text x="420" y="382" fill="#E2E8F0" font-size="19" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Evolucao de chamados por prioridade</text>
  <polyline points="430,560 520,520 610,535 700,470 790,490 880,430 970,455 1060,390 1130,410" stroke="url(#accent)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="430" y1="580" x2="1130" y2="580" stroke="#2F4B6A"/>
  <line x1="430" y1="580" x2="430" y2="420" stroke="#2F4B6A"/>

  <rect x="1170" y="340" width="310" height="280" rx="18" fill="#102742" stroke="#3E5E84"/>
  <text x="1200" y="382" fill="#E2E8F0" font-size="19" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Fila critica</text>
  <rect x="1200" y="418" width="250" height="48" rx="12" fill="#1A3453"/>
  <text x="1220" y="448" fill="#E2E8F0" font-size="14" font-family="Segoe UI, Arial, sans-serif">Ticket #4312  -  Falha SAP</text>
  <rect x="1200" y="478" width="250" height="48" rx="12" fill="#1A3453"/>
  <text x="1220" y="508" fill="#E2E8F0" font-size="14" font-family="Segoe UI, Arial, sans-serif">Ticket #4308  -  Rede unidade</text>
  <rect x="1200" y="538" width="250" height="48" rx="12" fill="#1A3453"/>
  <text x="1220" y="568" fill="#E2E8F0" font-size="14" font-family="Segoe UI, Arial, sans-serif">Ticket #4299  -  SLA estourando</text>

  <rect x="390" y="650" width="1090" height="150" rx="18" fill="#102742" stroke="#3E5E84"/>
  <text x="420" y="692" fill="#E2E8F0" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Impacto de negocio</text>
  <text x="420" y="734" fill="#9FB6CF" font-size="16" font-family="Segoe UI, Arial, sans-serif">Visibilidade em tempo real de operacao, performance de SLA e gargalos por setor.</text>
</svg>
